services:
  mysql:
    image: mysql:8.0
    container_name: couple-diary-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: couple_diary
      MYSQL_USER: couple_diary
      MYSQL_PASSWORD: couple_diary
      TZ: UTC
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
