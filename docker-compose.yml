services:
  mysql:
    image: mysql:8.0
    container_name: couple-diary-mysql
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: couple_diary
      MYSQL_USER: couple_diary
      MYSQL_PASSWORD: couple_diary
      TZ: UTC
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ucouple_diary", "-pcouple_diary"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: couple-diary-backend
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: couple_diary
      DB_USERNAME: couple_diary
      DB_PASSWORD: couple_diary
      DB_TIMEZONE: UTC
      SERVER_PORT: 8080
      CORS_ALLOWED_ORIGIN: "http://localhost:${FRONTEND_PORT:-3000}"

  frontend:
    build:
      context: ./frontend
    container_name: couple-diary-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      API_BASE_URL: http://backend:8080
      NEXT_PUBLIC_API_BASE_URL: http://backend:8080

volumes:
  mysql-data:
