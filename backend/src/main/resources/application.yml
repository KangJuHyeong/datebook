spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: couple-diary-backend
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:couple_diary}?serverTimezone=${DB_TIMEZONE:UTC}&characterEncoding=UTF-8
    username: ${DB_USERNAME:couple_diary}
    password: ${DB_PASSWORD:couple_diary}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  sql:
    init:
      mode: always
  flyway:
    enabled: false

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:3000}
