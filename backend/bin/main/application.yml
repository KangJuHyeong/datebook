spring:
  application:
    name: couple-diary-backend
  datasource:
    url: jdbc:mysql://localhost:3306/couple_diary?serverTimezone=UTC&characterEncoding=UTF-8
    username: couple_diary
    password: couple_diary
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  sql:
    init:
      mode: always

server:
  port: 8080
